# MagicBridgeV2 — extra nginx location blocks for the add-on services.
# Dropped at /etc/kvmd/nginx/magicbridge.conf and included by kvmd's nginx
# server block. kvmd already terminates TLS on :443; we just add upstreams.
#
# NOTE: kvmd's nginx include path/mechanism is confirmed on-device during
# hardware bring-up (see docs/PORTING.md). If kvmd uses a different include
# convention on the installed OS build, magic-install.sh adapts in phase5.

# MagicBridge network toolkit (DuckDNS, lockdown, MAC, WiFi helpers)
location /mb/net/ {
    proxy_pass http://127.0.0.1:8410/;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Host $host;
}

# MagicBridge stealth USB identity panel
location /mb/stealth/ {
    proxy_pass http://127.0.0.1:8411/;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Host $host;
}

# MagicBridge AI agent (disabled by default via feature flag)
location /mb/agent/ {
    proxy_pass http://127.0.0.1:8412/;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Host $host;
}

# MagicBridgeV2 web UI (professional cockpit). Served at /mb/ui/.
# The UI uses absolute /api (kvmd) and /mb (our services) paths, so it works
# from here. To make it the DEFAULT front page, on-device change kvmd's
# `location = /` root to /opt/magicbridge/web (validated during bring-up).
location /mb/ui/ {
    alias /opt/magicbridge/web/;
    index index.html;
    try_files $uri $uri/ /mb/ui/index.html;
}

# Dedicated Stealth Control panel (all spoofing: USB identity + MAC + EDID).
# Separate page with its own cyberpunk theme, at https://<host>/stealth/
location /stealth/ {
    alias /opt/magicbridge/web/stealth/;
    index index.html;
    try_files $uri $uri/ /stealth/index.html;
}
